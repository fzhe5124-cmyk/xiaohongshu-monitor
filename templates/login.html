<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · XHS MONITOR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;500;700;900&family=DM+Mono:wght@400;500&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&family=Noto+Serif+SC:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #07070b;
            --surface: #111116;
            --surface2: #1a1a22;
            --border: #2a2a38;
            --text: #eeeeee;
            --text2: #9494a8;
            --text3: #5c5c70;
            --accent: #ff4d4d;
            --accent-dim: rgba(255,77,77,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -30%; right: -15%;
            width: 60%; height: 80%;
            background: radial-gradient(ellipse, rgba(255,77,77,0.06) 0%, transparent 70%);
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -20%; left: -10%;
            width: 50%; height: 60%;
            background: radial-gradient(ellipse, rgba(96,165,250,0.04) 0%, transparent 70%);
            pointer-events: none;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 400px;
            padding: 56px 40px 44px;
            text-align: center;
            position: relative;
            z-index: 1;
            animation: rise 0.8s cubic-bezier(0.16,1,0.3,1) both;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 20px; right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.4;
        }

        .logo {
            width: 64px; height: 64px;
            background: var(--accent-dim);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
            font-family: 'Archivo', sans-serif;
            font-size: 22px; font-weight: 900;
            color: var(--accent);
            border: 1px solid rgba(255,77,77,0.2);
        }

        h1 {
            font-family: 'Newsreader', 'Noto Serif SC', serif;
            font-size: 24px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.3px;
            margin-bottom: 4px;
        }
        .subtitle {
            font-family: 'DM Mono', monospace;
            color: var(--text3);
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 36px;
        }
        .divider {
            width: 32px; height: 2px;
            background: var(--accent);
            margin: 0 auto 36px;
            border-radius: 1px;
            opacity: 0.4;
        }

        .form-group { margin-bottom: 22px; }
        input[type="password"] {
            width: 100%;
            padding: 16px 18px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: 'DM Mono', monospace;
            font-size: 15px;
            color: var(--text);
            outline: none;
            text-align: center;
            letter-spacing: 6px;
            transition: all 0.3s;
        }
        input[type="password"]::placeholder {
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: 1px;
            color: #444;
        }
        input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-dim);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Archivo', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            transition: left 0.6s;
        }
        .btn:hover::before { left: 100%; }
        .btn:hover {
            background: #ff3333;
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(255,77,77,0.3);
        }
        .btn:active { transform: translateY(0); }

        .error {
            background: rgba(255,77,77,0.08);
            border: 1px solid rgba(255,77,77,0.2);
            color: #ff4d4d;
            padding: 14px 18px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 22px;
        }
        .footer {
            color: var(--text3);
            font-size: 12px;
            font-weight: 300;
            margin-top: 28px;
            letter-spacing: 1px;
        }
        .footer span { color: var(--accent); }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">✦</div>
        <h1>XHS MONITOR</h1>
        <div class="subtitle">Access Terminal</div>
        <div class="divider"></div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <input type="password" name="key" placeholder="访问密钥" required autofocus>
            </div>
            <button type="submit" class="btn">进入系统</button>
        </form>
        <div class="footer">联系管理员 · <span>授权访问</span></div>
    </div>
</body>
</html>
