<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付 - 小红书竞品监控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 440px;
            padding: 40px;
            text-align: center;
        }
        .icon { font-size: 48px; margin-bottom: 16px; }
        h2 { font-size: 20px; color: #1a1a2e; margin-bottom: 8px; }
        .keyword-badge {
            display: inline-block;
            background: #fff0f0;
            color: #ff6b6b;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 24px;
        }
        .qrcode {
            width: 240px;
            height: 240px;
            margin: 0 auto 20px;
            border: 2px dashed #e0e0e0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #999;
        }
        .qrcode iframe, .qrcode img {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 10px;
        }
        .price {
            font-size: 28px;
            font-weight: 700;
            color: #ff6b6b;
            margin-bottom: 8px;
        }
        .hint { font-size: 13px; color: #999; margin-bottom: 20px; }
        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn:hover { background: #ee5a5a; }
        .status {
            margin-top: 16px;
            font-size: 14px;
            color: #666;
        }
        .status .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00b894;
            border-radius: 50%;
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0.3; } }
        .status-check {
            margin-top: 20px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 13px;
        }
        .status-check a { color: #ff6b6b; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">💳</div>
        <h2>请完成支付</h2>
        <div class="keyword-badge">{{ keyword }}</div>

        {% if pay_url %}
        <div class="qrcode">
            <img src="{{ pay_url }}" alt="支付二维码"
                 onerror="this.parentElement.innerHTML='<p>支付链接已生成，请点击下方按钮支付</p>'">
        </div>
        {% else %}
        <div class="qrcode">
            <p>支付二维码加载失败</p>
        </div>
        {% endif %}

        <div class="price">¥{{ price }}</div>
        <div class="hint">微信 / 支付宝 扫码支付</div>

        <a href="{{ pay_url }}" target="_blank" class="btn">打开支付页面</a>

        <div class="status">
            <span class="dot"></span> 等待支付完成...
        </div>

        <div class="status-check">
            支付完成后页面将自动跳转<br>
            如果未跳转，请 <a href="/pay-result/{{ order_id }}">点击这里</a>
        </div>
    </div>

    <script>
        // 轮询支付状态
        const orderId = "{{ order_id }}";
        let retries = 0;
        const maxRetries = 60;

        function checkPayment() {
            fetch("/api/order-status/" + orderId)
                .then(r => r.json())
                .then(data => {
                    if (data.status === "paid") {
                        window.location.href = "/report/" + orderId;
                    } else if (retries < maxRetries) {
                        retries++;
                        setTimeout(checkPayment, 2000);
                    }
                })
                .catch(() => {
                    if (retries < maxRetries) {
                        retries++;
                        setTimeout(checkPayment, 3000);
                    }
                });
        }

        setTimeout(checkPayment, 3000);
    </script>
</body>
</html>
